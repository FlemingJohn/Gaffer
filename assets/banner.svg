<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="Gaffer - the offline, on-device AI assistant coach that learns your team">
  <defs>
    <linearGradient id="pitch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e7a3b"/>
      <stop offset="1" stop-color="#0a5e2d"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d7ffe6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- pitch -->
  <rect width="1200" height="300" fill="url(#pitch)"/>

  <!-- mowed stripes -->
  <g fill="#ffffff" opacity="0.04">
    <rect x="0"    y="0" width="150" height="300"/>
    <rect x="300"  y="0" width="150" height="300"/>
    <rect x="600"  y="0" width="150" height="300"/>
    <rect x="900"  y="0" width="150" height="300"/>
  </g>

  <!-- pitch markings -->
  <g stroke="#ffffff" stroke-width="2" fill="none" opacity="0.5">
    <rect x="24" y="24" width="1152" height="252" rx="6"/>
    <line x1="600" y1="24" x2="600" y2="276"/>
    <circle cx="600" cy="150" r="56"/>
    <circle cx="600" cy="150" r="3" fill="#ffffff" stroke="none"/>
    <!-- left box -->
    <rect x="24" y="80" width="92" height="140"/>
    <rect x="24" y="118" width="40" height="64"/>
    <!-- right box -->
    <rect x="1084" y="80" width="92" height="140"/>
    <rect x="1136" y="118" width="40" height="64"/>
  </g>

  <!-- tactics: arrows + dots, like a coach's board -->
  <g opacity="0.85" filter="url(#soft)">
    <circle cx="170" cy="150" r="9" fill="#ffd23f" stroke="#0a3" stroke-width="1.5"/>
    <circle cx="250" cy="100" r="9" fill="#ffd23f" stroke="#0a3" stroke-width="1.5"/>
    <circle cx="250" cy="200" r="9" fill="#ffd23f" stroke="#0a3" stroke-width="1.5"/>
    <path d="M182 150 C 210 150, 224 110, 240 104" stroke="#ffffff" stroke-width="3" fill="none" stroke-dasharray="2 7" stroke-linecap="round"/>
    <path d="M182 150 C 210 150, 224 190, 240 196" stroke="#ffffff" stroke-width="3" fill="none" stroke-dasharray="2 7" stroke-linecap="round"/>
  </g>

  <!-- football icon -->
  <g transform="translate(1010,150)" filter="url(#soft)">
    <circle r="34" fill="#ffffff" stroke="#0a3" stroke-width="2"/>
    <path d="M0 -18 l17 12 -6 20 -22 0 -6 -20 Z" fill="#0c0c0c"/>
    <g stroke="#0c0c0c" stroke-width="3" fill="none" stroke-linecap="round">
      <path d="M0 -34 V -18"/>
      <path d="M32 -10 L17 -6"/>
      <path d="M20 30 L11 14"/>
      <path d="M-20 30 L-11 14"/>
      <path d="M-32 -10 L-17 -6"/>
    </g>
  </g>

  <!-- wordmark -->
  <g filter="url(#soft)" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="80" y="170" font-size="92" font-weight="800" letter-spacing="1" fill="url(#ink)">Gaffer</text>
    <text x="84" y="212" font-size="24" font-weight="600" fill="#eafff2" opacity="0.95">The offline, on-device AI assistant coach that learns your team</text>
  </g>

  <!-- track badge -->
  <g transform="translate(80,236)" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
    <rect x="0" y="0" width="270" height="34" rx="17" fill="#06351a" stroke="#ffffff" stroke-opacity="0.25"/>
    <circle cx="22" cy="17" r="6" fill="#ffd23f"/>
    <text x="40" y="23" font-size="15" font-weight="600" fill="#eafff2">Tether Developers Cup &#183; QVAC track</text>
  </g>
</svg>
